{% include "menu/superior.html" %}

<div class="upload-form-container">
  <h2 class="titulo-seccion">Sube tus apuntes</h2>
  <p>Tus apuntes serán revisados y aprobados por el equipo de Delegación</p>

  <form method="post" enctype="multipart/form-data" class="formulario-apunte">
    {% csrf_token %}

    <div class="form-grupo">
      <label for="id_titulo">Título</label>
      <input type="text" name="tema" id="id_titulo" placeholder="Ej: Determinantes" required>
    </div>

    <div class="form-grupo">
      <label for="id_asignatura">Asignatura a la que pertenece</label>
      <select name="asignatura" id="asignatura_id" required>
        {% for asignatura in asignaturas %}
          <option value="{{asignatura.id}}">{{asignatura.nombre}}</option>          
        {% endfor %}
      </select>
    </div>

    <div class="form-grupo">
      <label for="id_descripcion">Descripción</label>
      <textarea name="descripcion" id="id_descripcion" placeholder="Breve descripción del apunte" rows="4" required></textarea>
    </div>

    <div class="form-grupo">
      <label for="id_archivo_pdf">Archivo PDF</label>
      <input type="file" name="archivo_pdf" id="id_archivo_pdf" accept="application/pdf" required>
    </div>

    <div class="form-grupo">
      <button type="submit" class="boton-principal">Subir Apunte</button>
    </div>
  </form>
</div>

{% include "menu/inferior.html" %}
